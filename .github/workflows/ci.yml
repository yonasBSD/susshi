name: CI

on:
  push:
    branches: [master]
    paths-ignore:
      - 'PKGBUILD'
      - 'PKGBUILD.bin'
      - '.SRCINFO'
  pull_request:
    branches: [master]

# Cancel any in-progress run for the same branch when a new push arrives.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── 0. Preflight ──────────────────────────────────────────────────────────
  #
  # Release-plz PRs only touch Cargo.toml (version) and CHANGELOG.md —
  # no code change, so running the full suite is wasteful.
  # Detection uses the branch name (release-plz-*) rather than the actor
  # login, because release-plz runs under a PAT and appears as the repo owner.
  # Skipped jobs satisfy branch protection rules (GitHub treats them as green).
  #
  # Pipeline for normal PRs / pushes to master:
  #  lint → test → coverage
  #              → cross-platform builds
  #
  # deny, msrv and megalinter run independently (orthogonal signal).
  # ─────────────────────────────────────────────────────────────────────────

  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    permissions: {}
    outputs:
      skip: ${{ steps.gate.outputs.skip }}
    steps:
      - name: Detect release-plz PR
        id: gate
        env:
          BRANCH: ${{ github.head_ref }}
        run: |
          if [[ "$BRANCH" == release-plz-* ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Release-plz PR — CI skipped (version bump only, no code change)"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

  # ── 1. Quality gate ───────────────────────────────────────────────────────

  lint:
    name: Lint (fmt + clippy)
    runs-on: ubuntu-latest
    needs: [preflight]
    if: needs.preflight.outputs.skip != 'true'
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: [preflight, lint]
    if: needs.preflight.outputs.skip != 'true'
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --verbose

  # ── 2. Security + MSRV (independent) ─────────────────────────────────────

  deny:
    name: Security (cargo deny)
    runs-on: ubuntu-latest
    needs: [preflight]
    if: needs.preflight.outputs.skip != 'true'
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run cargo-deny
        uses: EmbarkStudios/cargo-deny-action@v2

  msrv:
    name: MSRV (Rust 1.88)
    runs-on: ubuntu-latest
    needs: [preflight]
    if: needs.preflight.outputs.skip != 'true'
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install MSRV toolchain
        uses: dtolnay/rust-toolchain@1.88

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: msrv

      - name: Check (MSRV)
        run: cargo +1.88 check --all-targets

  megalinter:
    name: MegaLinter
    runs-on: ubuntu-latest
    needs: [preflight]
    if: needs.preflight.outputs.skip != 'true'
    permissions:
      contents: read
      statuses: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run MegaLinter
        uses: oxsecurity/megalinter/flavors/rust@v8
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 3. Coverage (gated on tests) ──────────────────────────────────────────

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: [preflight, test]
    if: needs.preflight.outputs.skip != 'true'
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked

      - name: Generate coverage report
        run: |
          cargo llvm-cov \
            --lcov \
            --output-path lcov.info \
            --ignore-filename-regex 'src/(ui/|main\.rs|i18n\.rs)'

      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
          fail_ci_if_error: false

  # ── 4. Cross-platform smoke builds (gated on tests) ───────────────────────

  cross-platform:
    name: Build — ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    needs: [preflight, test]
    if: needs.preflight.outputs.skip != 'true'
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            openssl_mode: system
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            openssl_mode: vendored
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            openssl_mode: system
          - os: macos-latest
            target: x86_64-apple-darwin
            openssl_mode: vendored
          - os: macos-14
            target: aarch64-apple-darwin
            openssl_mode: system
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            openssl_mode: system

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ matrix.target }}

      - name: Install Linux build deps
        if: contains(matrix.target, 'unknown-linux')
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev
          if [[ "$TARGET" == *musl* ]]; then
            sudo apt-get install -y musl-tools
          fi

      - name: Set OpenSSL paths (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          "OPENSSL_DIR=C:\Strawberry\c" | Out-File -FilePath $env:GITHUB_ENV -Append
          "OPENSSL_STATIC=1" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Build (system OpenSSL)
        if: matrix.openssl_mode == 'system'
        env:
          OPENSSL_NO_VENDOR: "1"
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (vendored OpenSSL)
        if: matrix.openssl_mode == 'vendored'
        run: cargo build --release --features openssl-vendored --target ${{ matrix.target }}

      - name: Run tests (Linux native only)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: cargo test --verbose
