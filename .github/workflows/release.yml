name: Release

# Triggered by a version tag (vX.Y.Z) pushed by release-plz,
# or manually via workflow_dispatch to re-publish an existing tag.
#
# Pipeline (parallel):
#   build          — one binary per platform, uploaded to the GitHub Release
#   build-deb      — amd64 + arm64 DEB packages
#   build-rpm      — Fedora RPM package
#
# After build:
#   update-pkgbuild — commits refreshed PKGBUILD to master,
#                     which triggers aur-publish.yml

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to re-publish (e.g. v0.11.0)"
        required: true

permissions:
  contents: write

jobs:
  # ── Platform binaries ─────────────────────────────────────────────────────

  build:
    name: Binary — ${{ matrix.asset_name }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_name: susshi
            asset_name: susshi-linux-x86_64
            openssl_mode: system
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            binary_name: susshi
            asset_name: susshi-linux-x86_64-static
            openssl_mode: vendored
          - os: macos-latest
            target: x86_64-apple-darwin
            binary_name: susshi
            asset_name: susshi-macos-intel
            openssl_mode: vendored
          - os: macos-14
            target: aarch64-apple-darwin
            binary_name: susshi
            asset_name: susshi-macos-apple-silicon
            openssl_mode: system
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary_name: susshi.exe
            asset_name: susshi-windows-x86_64.exe
            openssl_mode: system

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install Linux build deps
        if: startsWith(matrix.target, 'x86_64-unknown-linux-')
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools pkg-config libssl-dev

      - name: Install OpenSSL (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          choco install openssl --no-progress -y
          $opensslDir = "C:\Program Files\OpenSSL-Win64"
          if (-not (Test-Path $opensslDir)) { $opensslDir = "C:\Program Files\OpenSSL" }
          echo "OPENSSL_DIR=$opensslDir" >> $env:GITHUB_ENV
          echo "OPENSSL_NO_VENDOR=1" >> $env:GITHUB_ENV

      - name: Build (system OpenSSL)
        if: matrix.openssl_mode == 'system'
        shell: bash
        env:
          OPENSSL_NO_VENDOR: "1"
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (vendored OpenSSL)
        if: matrix.openssl_mode == 'vendored'
        shell: bash
        run: cargo build --release --features openssl-vendored --target ${{ matrix.target }}

      - name: Copy binary to release asset name
        shell: bash
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.binary_name }} ${{ matrix.asset_name }}
          chmod +x ${{ matrix.asset_name }} || true

      - name: Upload to GitHub Release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ${{ matrix.asset_name }}
          asset_name: ${{ matrix.asset_name }}
          tag: ${{ github.event.inputs.tag || github.ref }}
          overwrite: true

  # ── DEB packages (amd64 + arm64) ─────────────────────────────────────────

  build-deb:
    name: DEB packages
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu, aarch64-unknown-linux-gnu

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-deb and cross
        run: |
          cargo install cargo-deb
          cargo install cross

      - name: Install system OpenSSL (amd64)
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev

      - name: Build amd64 DEB
        env:
          OPENSSL_NO_VENDOR: "1"
        run: |
          cargo build --release --target x86_64-unknown-linux-gnu
          cargo deb --no-build --target x86_64-unknown-linux-gnu

      - name: Build arm64 DEB (cross-compiled)
        run: |
          cross build --release --features openssl-vendored --target aarch64-unknown-linux-gnu
          cargo deb --no-build --target aarch64-unknown-linux-gnu

      - name: Smoke test (amd64)
        run: |
          sudo dpkg -i target/debian/susshi_*_amd64.deb
          susshi --version
          sudo dpkg -r susshi

      - name: Upload to GitHub Release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: target/debian/susshi_*.deb
          file_glob: true
          tag: ${{ github.event.inputs.tag || github.ref }}
          overwrite: true

  # ── RPM package (Fedora) ──────────────────────────────────────────────────

  build-rpm:
    name: RPM package
    runs-on: ubuntu-latest
    container: fedora:latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Install build dependencies
        run: dnf install -y rust cargo openssl-devel zlib-devel pkgconf-pkg-config rpm-build rpmdevtools git

      - name: Set up rpmbuild tree
        run: rpmdev-setuptree

      - name: Patch version in spec file
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          sed -i "s/^Version:.*/Version:        ${VERSION}/" susshi.spec

      - name: Fetch source archive
        run: spectool -g -R susshi.spec

      - name: Build RPM
        env:
          OPENSSL_NO_VENDOR: "1"
          LIBZ_SYS_USE_PKG_CONFIG: "1"
        run: rpmbuild -ba susshi.spec

      - name: Smoke test
        shell: bash
        run: |
          shopt -s globstar
          rpm_file=$(ls /github/home/rpmbuild/RPMS/**/*.rpm | head -n1)
          dnf install -y "${rpm_file}"
          susshi --version
          rpm -e susshi

      - name: Upload to GitHub Release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: /github/home/rpmbuild/RPMS/**/*.rpm
          file_glob: true
          tag: ${{ github.event.inputs.tag || github.ref }}
          overwrite: true

  # ── Arch Linux PKGBUILD (committed to repo) ───────────────────────────────

  update-pkgbuild:
    name: Update PKGBUILD in repo
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - name: Checkout master
        uses: actions/checkout@v6
        with:
          # PAT required so this push triggers aur-publish.yml.
          # GITHUB_TOKEN pushes are silently ignored by workflow event triggers.
          token: ${{ secrets.RELEASE_PLZ_TOKEN }}
          ref: master

      - name: Update PKGBUILD
        run: bash scripts/update-pkgbuild.sh

      - name: Regenerate .SRCINFO
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/pkg" \
            -w /pkg \
            archlinux:latest \
            bash -c "
              pacman -Sy --noconfirm base-devel > /dev/null 2>&1
              useradd -m builder
              chown -R builder:builder /pkg
              su builder -s /bin/bash -c 'cd /pkg && makepkg --printsrcinfo > /pkg/.SRCINFO'
            "

      - name: Fix workspace permissions after Docker
        run: sudo chown -R "$USER" .

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add PKGBUILD PKGBUILD.bin .SRCINFO
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          git commit -m "chore(release): update PKGBUILD to v${VERSION}"
          git push
